<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 200" width="100%" height="auto" preserveAspectRatio="xMidYMid meet">
  <defs>
    <linearGradient id="g" x1="0%" x2="100%" y1="0%" y2="0%">
      <stop offset="0%" stop-color="#00F1DC"/>
      <stop offset="44%" stop-color="#5673F1"/>
      <stop offset="54%" stop-color="#6744F1"/>
      <stop offset="100%" stop-color="#FE00FF"/>
    </linearGradient>
    <!-- Reveal mask: grows from 0 to full width -->
    <clipPath id="reveal">
      <rect id="revealRect" x="0" y="0" width="0" height="200">
        <animate attributeName="width" from="0" to="1200" dur="2.4s" fill="freeze" />
      </rect>
    </clipPath>
  </defs>

  <rect width="1200" height="200" fill="none" />

  <g clip-path="url(#reveal)">
    <text x="50%" y="50%" dominant-baseline="middle" text-anchor="middle"
          font-family="monospace" font-size="48" fill="url(#g)">
      Olá, pessoa. O que procuras?
    </text>
  </g>

  <!-- Simple blinking caret placed after text; appears after reveal finishes -->
  <g>
    <rect id="caret" x="680" y="70" width="6" height="40" fill="#FE00FF" opacity="0">
      <set attributeName="opacity" to="1" begin="2.4s" />
      <animate attributeName="opacity" values="1;0;1" dur="0.8s" begin="2.4s" repeatCount="indefinite"/>
    </rect>
  </g>
</svg>
<svg fill="none" width="100%"  xmlns="http://www.w3.org/2000/svg">
	<foreignObject width="100%" height="100%">
		<div xmlns="http://www.w3.org/1999/xhtml">
            <style>
                .wrapper {
                    height: 100vh;
                    display: grid;
                    place-items: center;
                }

                .text {
                    display: inline-block;
                    white-space: nowrap;
                    overflow: hidden;
                    font-family: monospace;
                    font-size: 2em;
                    background: linear-gradient(90deg, rgba(0,241,220,1) 0%, rgba(86,115,241,1) 44%, rgba(103,68,241,1) 54%, rgba(254,0,255,1) 100%);
                    -webkit-background-clip: text;
                    -webkit-text-fill-color: transparent;
                    /* Adjust duration and steps to match character count (~29) */
                    animation: typing 2.4s steps(29, end) 0s 1 forwards;
                }

                .text::after {
                    content: '';
                    display: inline-block;
                    width: 3px;
                    height: 1em;
                    margin-left: 6px;
                    background: rgba(254,0,255,1);
                    vertical-align: middle;
                    animation: blink 0.8s step-end infinite;
                }

                @keyframes typing {
                    from { max-width: 0ch; }
                    to { max-width: 30ch; }
                }

                @keyframes blink {
                    0%, 40% { opacity: 1; }
                    60%, 100% { opacity: 0; }
                }
            </style>
            <div class="wrapper">
                <div class="text">
                    Olá, pessoa. O que procuras?
                </div>
            </div>
		</div>
	</foreignObject>
</svg>